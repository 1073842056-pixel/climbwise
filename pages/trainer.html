<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>训练计划 - ClimbWise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{cliff:{500:'#22c55e',600:'#16a34a'},rock:{500:'#a855f7'}}}}}</script>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="bg-slate-900 min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-700/50">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cliff-500 to-rock-500 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l14 9-14 9V3z"/></svg>
        </div>
        <span class="text-xl font-bold text-white">ClimbWise</span>
      </div>
      <a href="../index.html" class="text-slate-400 hover:text-white text-sm">← 返回首页</a>
    </div>
  </nav>
  <div class="pt-20 pb-8 px-4 max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-white mb-2">📋 训练计划生成器</h1>
    <p class="text-slate-400 text-sm mb-6">告诉我你的情况，AI帮你制定专属训练计划</p>
    <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-6 backdrop-blur-sm">
      <form id="trainerForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-3">你的攀岩水平</label>
          <div class="grid grid-cols-3 gap-3">
            <label class="relative cursor-pointer"><input type="radio" name="level" value="beginner" class="peer sr-only" checked><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-cliff-500 peer-checked:bg-cliff-500/20 transition-all"><div class="text-white font-medium">初学者</div><div class="text-xs text-slate-400">V0-V2</div></div></label>
            <label class="relative cursor-pointer"><input type="radio" name="level" value="intermediate" class="peer sr-only"><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-cliff-500 peer-checked:bg-cliff-500/20 transition-all"><div class="text-white font-medium">中级</div><div class="text-xs text-slate-400">V3-V5</div></div></label>
            <label class="relative cursor-pointer"><input type="radio" name="level" value="advanced" class="peer sr-only"><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-cliff-500 peer-checked:bg-cliff-500/20 transition-all"><div class="text-white font-medium">高级</div><div class="text-xs text-slate-400">V6+</div></div></label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-3">主要目标</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="relative cursor-pointer"><input type="radio" name="goal" value="strength" class="peer sr-only" checked><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-rock-500 peer-checked:bg-rock-500/20 transition-all"><div class="text-white font-medium text-sm">指力提升</div></div></label>
            <label class="relative cursor-pointer"><input type="radio" name="goal" value="technique" class="peer sr-only"><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-rock-500 peer-checked:bg-rock-500/20 transition-all"><div class="text-white font-medium text-sm">技术精细化</div></div></label>
            <label class="relative cursor-pointer"><input type="radio" name="goal" value="redpoint" class="peer sr-only"><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-rock-500 peer-checked:bg-rock-500/20 transition-all"><div class="text-white font-medium text-sm">Redpoint</div></div></label>
            <label class="relative cursor-pointer"><input type="radio" name="goal" value="endurance" class="peer sr-only"><div class="p-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-center peer-checked:border-rock-500 peer-checked:bg-rock-500/20 transition-all"><div class="text-white font-medium text-sm">耐力提升</div></div></label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-3">每周可用训练时间</label>
          <select name="time" class="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cliff-500/50">
            <option value="3">3小时以下</option><option value="5" selected>3-5小时</option><option value="8">5-8小时</option><option value="10">8-10小时</option><option value="15">10小时以上</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-3">是否有伤病？（选填）</label>
          <input type="text" name="injury" placeholder="例如：右手A2手指有点疼" class="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:border-cliff-500/50">
        </div>
        <button type="button" onclick="generatePlan()" class="w-full py-4 bg-gradient-to-r from-cliff-500 to-cliff-600 hover:from-cliff-400 hover:to-cliff-500 text-white font-semibold rounded-xl shadow-lg shadow-cliff-500/30 transition-all flex items-center justify-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          生成专属训练计划
        </button>
      </form>
      <div id="result" class="hidden mt-6 pt-6 border-t border-slate-700/50">
        <h3 class="text-xl font-bold text-white mb-4">🎯 你的专属训练计划</h3>
        <div id="planContent" class="space-y-3"></div>
      </div>
    </div>
  </div>
  <script src="../lib/api.js"></script>
  <script>
    async function generatePlan() {
      if (!window.ClimbWiseAPI?.isConfigured?.()) { alert('请先配置API Key'); return; }
      const form = document.getElementById('trainerForm');
      const level = form.level.value;
      const goal = form.goal.value;
      const time = form.time.value;
      const injury = form.injury.value;
      const btn = event.target;
      btn.disabled = true; btn.innerHTML = '<span class="animate-pulse">生成中...</span>';
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('planContent').innerHTML = '<div class="text-slate-400 text-sm">AI正在生成...</div>';
      const levelText = level==='beginner'?'初学者(V0-V2)':level==='intermediate'?'中级(V3-V5)':'高级(V6+)';
      const goalText = goal==='strength'?'指力提升':goal==='technique'?'技术精细化':goal==='redpoint'?'Redpoint突破':'耐力提升';
      const prompt = 作为专业攀岩教练，请为以下攀岩者生成一周训练计划：\n水平: 目标: 每周时间:小时\n请给出详细每周安排。;
      try {
        const reply = await window.ClimbWiseAPI.sendMessage(prompt, []);
        document.getElementById('planContent').innerHTML = '<div class="plan-card"><p class="text-slate-200 text-sm whitespace-pre-wrap">'+escapeHtml(reply)+'</p></div>';
      } catch(e) {
        document.getElementById('planContent').innerHTML = '<div class="plan-card" style="border-left-color:#ef4444"><p class="text-red-300 text-sm">生成失败: '+e.message+'</p></div>';
      }
      btn.disabled = false; btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>生成专属训练计划';
    }
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
  </script>
</body>
</html>
